<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blocky 3D Obby</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="game-panel" aria-label="Blocky 3D Obby game">
      <div class="topbar">
        <div>
          <p class="eyebrow">Blocky 3D Obby</p>
          <h1>Run, jump, and climb the floating course.</h1>
        </div>
        <div class="stats" aria-live="polite">
          <span id="stageText">Stage 1</span>
          <span id="studsText">Studs 0</span>
          <span id="timerText">0.0s</span>
        </div>
        <div class="top-actions">
          <button class="settings-button" type="button" data-fullscreen-button>Fullscreen</button>
          <button id="settingsButton" class="settings-button" type="button" aria-expanded="false">Settings</button>
        </div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" aria-label="3D blocky obby game canvas"></canvas>
        <div id="message" class="message hidden">
          <strong>Obby complete</strong>
          <button id="restartButton" type="button">Play again</button>
        </div>
        <div id="settingsPanel" class="settings-panel hidden" role="dialog" aria-modal="false" aria-label="Game settings">
          <div class="settings-card">
            <div class="settings-header">
              <strong>Settings</strong>
              <button id="closeSettingsButton" class="close-button" type="button" aria-label="Close settings">X</button>
            </div>

            <div class="settings-row">
              <div>
                <strong>Camera Sensitivity</strong>
                <span id="sensitivityValue">1.2</span>
              </div>
              <input id="sensitivitySlider" type="range" min="0.5" max="2.5" step="0.1" value="1.2">
            </div>

            <div class="settings-row">
              <div>
                <strong>Movement Speed</strong>
                <span id="speedValue">1.00x</span>
              </div>
              <input id="speedSlider" type="range" min="0.7" max="1.4" step="0.05" value="1">
            </div>

            <div class="settings-row">
              <div>
                <strong>FPS Limit</strong>
                <span id="fpsValue">60 FPS</span>
              </div>
              <input id="fpsSlider" type="range" min="30" max="144" step="1" value="60">
            </div>

            <div class="settings-row split-row">
              <strong>Graphics Mode</strong>
              <div class="segmented" aria-label="Graphics mode">
                <button type="button" data-quality="low">Low</button>
                <button type="button" data-quality="medium" class="active">Medium</button>
                <button type="button" data-quality="high">High</button>
              </div>
            </div>

            <label class="settings-row switch-row">
              <strong>Shadows</strong>
              <input id="shadowsToggle" type="checkbox" checked>
            </label>

            <label class="settings-row switch-row">
              <strong>Shift Lock</strong>
              <input id="shiftLockToggle" type="checkbox">
            </label>

            <label class="settings-row switch-row">
              <strong>Always Show Touch Controls</strong>
              <input id="mobileControlsToggle" type="checkbox">
            </label>

            <div class="settings-row split-row">
              <strong>Display</strong>
              <button id="fullscreenButton" class="panel-button" type="button" data-fullscreen-button>Fullscreen</button>
            </div>
          </div>
        </div>
        <div class="touch-controls" aria-label="Touch controls">
          <div class="dpad">
            <button class="control-button forward" type="button" data-control="forward">W</button>
            <button class="control-button left" type="button" data-control="left">A</button>
            <button class="control-button back" type="button" data-control="back">S</button>
            <button class="control-button right" type="button" data-control="right">D</button>
          </div>
          <button class="control-button jump" type="button" data-control="jump">Jump</button>
        </div>
        <div class="shift-crosshair" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
